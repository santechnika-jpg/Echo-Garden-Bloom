<!doctype html>
<html lang="lt">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#061c1f">
    <title>Echo Garden reset</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #031113;
        color: #e9f8ef;
      }

      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 18%, rgba(102, 234, 220, 0.18), transparent 34%),
          linear-gradient(180deg, #082628 0%, #031113 100%);
      }

      main {
        width: min(100%, 420px);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.7rem;
      }

      p {
        margin: 0 0 18px;
        color: #b9d8cf;
        line-height: 1.45;
      }

      button,
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        border: 0;
        border-radius: 8px;
        padding: 0 16px;
        background: #7ee6a8;
        color: #03201f;
        font: inherit;
        font-weight: 800;
        text-decoration: none;
      }

      #status {
        min-height: 24px;
        margin-top: 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Echo Garden atnaujinimas</h1>
      <p>Šis puslapis išvalo seną žaidimo kopiją naršyklėje ir įjungia naują versiją.</p>
      <button id="resetButton" type="button">Išvalyti ir atidaryti v11</button>
      <p id="status" role="status" aria-live="polite">Paruošta.</p>
    </main>

    <script>
      const status = document.getElementById("status");
      const resetButton = document.getElementById("resetButton");

      async function resetEchoGarden() {
        status.textContent = "Valau seną žaidimo kopiją...";
        resetButton.disabled = true;

        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        status.textContent = "Atidarau naują versiją...";
        window.location.replace("./?v=11&reset=1&time=" + Date.now());
      }

      resetButton.addEventListener("click", () => {
        resetEchoGarden().catch(() => {
          status.textContent = "Nepavyko automatiškai. Atidaryk žaidimą privačiame lange.";
          resetButton.disabled = false;
        });
      });
    </script>
  </body>
</html>
